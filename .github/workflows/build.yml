name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ppt2img-linux-x64
            bin_name: ppt2img
            pdfium_url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-linux-x64.tgz
            pdfium_lib: lib/libpdfium.so

          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: ppt2img-macos-arm64
            bin_name: ppt2img
            pdfium_url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-arm64.tgz
            pdfium_lib: lib/libpdfium.dylib

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ppt2img-windows-x64
            bin_name: ppt2img.exe
            pdfium_url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz
            pdfium_lib: bin/pdfium.dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          package_dir="dist/${{ matrix.artifact_name }}"
          mkdir -p "$package_dir"

          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "$package_dir/"
          cp README.md "$package_dir/"
          if [ -f LICENSE ]; then
            cp LICENSE "$package_dir/"
          fi

          mkdir -p pdfium
          curl -L "${{ matrix.pdfium_url }}" -o pdfium/pdfium.tgz
          tar -xzf pdfium/pdfium.tgz -C pdfium
          cp "pdfium/${{ matrix.pdfium_lib }}" "$package_dir/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Archive packages
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release
          for package_dir in dist/*; do
            package_name="$(basename "$package_dir")"
            tar -czf "release/${package_name}.tar.gz" -C "$package_dir" .
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
