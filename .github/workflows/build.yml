name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ppt2img-linux-x64
            bin_name: ppt2img
            pdfium_url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-linux-x64.tgz
            pdfium_lib: lib/libpdfium.so

          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: ppt2img-macos-arm64
            bin_name: ppt2img
            pdfium_url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-arm64.tgz
            pdfium_lib: lib/libpdfium.dylib

          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: ppt2img-macos-x64
            bin_name: ppt2img
            pdfium_url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-x64.tgz
            pdfium_lib: lib/libpdfium.dylib

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ppt2img-windows-x64
            bin_name: ppt2img.exe
            pdfium_url: https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz
            pdfium_lib: bin/pdfium.dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          package_dir="dist/${{ matrix.artifact_name }}"
          mkdir -p "$package_dir"

          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "$package_dir/"
          cp README.md "$package_dir/"
          if [ -f LICENSE ]; then
            cp LICENSE "$package_dir/"
          fi

          mkdir -p pdfium
          curl -L "${{ matrix.pdfium_url }}" -o pdfium/pdfium.tgz
          tar -xzf pdfium/pdfium.tgz -C pdfium
          cp "pdfium/${{ matrix.pdfium_lib }}" "$package_dir/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
